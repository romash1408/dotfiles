[packages]
# CLI tools installed everywhere (brew formulae).
# NO tmux here: on Linux it must be the system one (apt). A newer brew tmux
# client can't attach to an older system tmux server (claude-remote on p8p
# runs /usr/bin/tmux): "open terminal failed: not a terminal". Verified: brew
# 3.7b client + brew server works, brew client + system 3.5a server fails.
brews = [
  "git", "curl", "wget", "vim", "htop", "jq",
  "tree", "ncdu", "ripgrep", "fzf",
  "mc", "kubectl", "helm",
]

[packages.darwin]
# macOS-only brew formulae (no system tmux there to conflict with)
brews = ["tmux"]
# macOS GUI apps (brew casks)
casks = []

[packages.linux]
# System (apt) packages for Linux: client/server tools that must match the
# system-side daemon (tmux: claude-remote's server runs /usr/bin/tmux).
# Package name must equal the binary name (used for the "already installed" check).
apt = ["tmux"]
# Linux GUI apps (flatpak from flathub, "org.app.Id"), only when hasGUI
flatpaks = []
